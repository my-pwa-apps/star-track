<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Star Track">
  <!-- Black background -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- LCARS orange elbow – top-left -->
  <rect x="0" y="0" width="200" height="72" rx="36" ry="36" fill="#FF9900"/>
  <rect x="0" y="0" width="72" height="200" fill="#FF9900"/>
  <rect x="0" y="0" width="72" height="72" fill="#FF9900"/>

  <!-- LCARS purple bar – bottom-right -->
  <rect x="160" y="460" width="352" height="40" rx="20" fill="#9966FF"/>

  <!-- LCARS blue bar – right edge -->
  <rect x="460" y="60" width="52" height="280" rx="10" fill="#6688FF"/>

  <!-- Outer targeting circle -->
  <circle cx="280" cy="248" r="148" fill="none" stroke="#66CCFF" stroke-width="3" stroke-dasharray="12 6"/>

  <!-- Inner reticle circle -->
  <circle cx="280" cy="248" r="88" fill="none" stroke="#66CCFF" stroke-width="2"/>

  <!-- Crosshair lines -->
  <line x1="280" y1="100" x2="280" y2="160" stroke="#66CCFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="280" y1="336" x2="280" y2="396" stroke="#66CCFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="132" y1="248" x2="192" y2="248" stroke="#66CCFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="368" y1="248" x2="428" y2="248" stroke="#66CCFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Diagonal tick marks -->
  <line x1="176" y1="145" x2="196" y2="165" stroke="#66CCFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="384" y1="145" x2="364" y2="165" stroke="#66CCFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="176" y1="351" x2="196" y2="331" stroke="#66CCFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="384" y1="351" x2="364" y2="331" stroke="#66CCFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Central 5-point star in orange -->
  <polygon points="280,204 290,237 326,237 298,257 308,290 280,270 252,290 262,257 234,237 270,237"
           fill="#FF9900"/>

  <!-- Small dot at centre -->
  <circle cx="280" cy="248" r="5" fill="#FFCC00"/>

  <!-- LCARS label -->
  <text x="88" y="54" font-family="Arial,sans-serif" font-size="28" font-weight="700"
        fill="#000000" letter-spacing="5">STAR TRACK</text>
</svg>
