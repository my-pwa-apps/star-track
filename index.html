<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050d18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Star Track – Real-time sky map with AR pointer mode" />
  <title>Star Track 🔭</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
<div id="app">

  <!-- ── Top toolbar ──────────────────────────────────────── -->
  <header id="toolbar">
    <div id="app-title">
      <span class="logo">🔭</span>
      <span class="title-text">Star Track</span>
    </div>

    <div id="search-wrapper">
      <input id="search-input" type="search" placeholder="Search stars, planets…" autocomplete="off" />
      <div id="search-results" class="hidden"></div>
    </div>

    <span id="time-display">00:00:00</span>

    <button id="btn-map" class="icon-btn" title="Sky Map">
      <span>🗺</span><span class="btn-label">Map</span>
    </button>
    <button id="btn-ar" class="icon-btn" title="AR Look Mode">
      <span>📡</span><span class="btn-label">AR</span>
    </button>
    <button id="btn-locate" class="icon-btn" title="Get location">📍</button>
    <button id="btn-settings" class="icon-btn" title="Settings">⚙️</button>
  </header>

  <!-- ── Settings panel (flyout) ──────────────────────────── -->
  <div id="settings-panel" class="hidden">
    <h4>⚙ Settings</h4>

    <div class="setting-row">
      <label for="chk-lines">Constellation lines</label>
      <label class="toggle-switch">
        <input type="checkbox" id="chk-lines" checked />
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <label for="chk-labels">Constellation names</label>
      <label class="toggle-switch">
        <input type="checkbox" id="chk-labels" checked />
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <label for="chk-names">Star names</label>
      <label class="toggle-switch">
        <input type="checkbox" id="chk-names" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <label for="chk-grid">Alt/Az grid</label>
      <label class="toggle-switch">
        <input type="checkbox" id="chk-grid" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting-row setting-row-range">
      <div class="range-label">
        <span>Limiting magnitude</span>
        <span id="slider-mag-val">5.5</span>
      </div>
      <input type="range" id="slider-mag" min="1" max="7" step="0.5" value="5.5" />
    </div>
  </div>

  <!-- ── Sky canvas ────────────────────────────────────────── -->
  <main id="canvas-container">
    <canvas id="sky-canvas"></canvas>
    <div id="status-bar" class="hidden"></div>
  </main>

  <!-- ── Info panel (object details) ─────────────────────── -->
  <div id="info-panel" class="hidden">
    <div id="info-panel-header">
      <button id="info-panel-close" title="Close">✕</button>
    </div>
    <div id="info-panel-body"></div>
  </div>

  <!-- ── Bottom quick-filter bar ──────────────────────────── -->
  <nav id="bottom-bar">
    <button class="filter-btn" id="filter-planets" title="Planets">
      <span class="fb-icon">🪐</span>
      <span>Planets</span>
    </button>
    <button class="filter-btn" id="filter-stars" title="Bright stars">
      <span class="fb-icon">⭐</span>
      <span>Stars</span>
    </button>
    <button class="filter-btn" id="filter-constellations" title="Constellations">
      <span class="fb-icon">✨</span>
      <span>Patterns</span>
    </button>
    <button class="filter-btn" id="filter-moon" title="Moon">
      <span class="fb-icon">🌕</span>
      <span>Moon</span>
    </button>
  </nav>

</div><!-- /#app -->

<!-- ── Libraries ─────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2/astronomy.browser.min.js"></script>

<!-- ── App scripts ───────────────────────────────────────── -->
<script src="js/data/stars.js"></script>
<script src="js/data/constellations.js"></script>
<script src="js/astronomy.js"></script>
<script src="js/renderer.js"></script>
<script src="js/app.js"></script>

</body>
</html>
